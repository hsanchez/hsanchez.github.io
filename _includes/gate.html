<script>
  (function () {
    var MASTER_HASH = "83006a438f94daf3a7dd9c7b27f70c15e443c0ca55d58fcdfa76899ae466b455";

    var RIDDLES = [
      {
        question: "Riddle: What has keys but can't open locks?",
        hashes: ["1d78e018e405ef26b7f7581336a2a4c556c3783eaa763978cbd7d2ddd0adb3ad", MASTER_HASH],
      },
      {
        question: "Riddle: I speak without a mouth and hear without ears. I have no body, but I come alive with the wind. What am I?",
        hashes: ["092c79e8f80e559e404bcf660c48f3522b67aba9ff1484b0367e1a4ddef7431d", MASTER_HASH],
      },
      {
        question: "Riddle: The more you take, the more you leave behind. What am I?",
        hashes: ["1a11a5a27be607e96d0205aa1304d7f39c97416ab35892049129d3f6eafa90fb", MASTER_HASH],
      },
      {
        question: "Riddle: I have cities but no houses, mountains but no trees, water but no fish. What am I?",
        hashes: ["60be9861750facbfad8758254a2f76c0cfe78d54459a3bc187d49b1401fcd8e8", MASTER_HASH],
      },
    ];

    var pick = RIDDLES[Math.floor(Math.random() * RIDDLES.length)];
    var QUESTION = pick.question;
    var ACCEPTED_HASHES = pick.hashes;

    var FORCE_THREE_IF_FIRST_FAIL = true;
    var STORAGE_KEY = "gatePassed:" + location.pathname;

    if (sessionStorage.getItem(STORAGE_KEY) === "1") return;

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function normalize(s) {
      return (s || "").trim().toLowerCase();
    }

    async function sha256(text) {
      var encoded = new TextEncoder().encode(text);
      var digest = await crypto.subtle.digest("SHA-256", encoded);
      return Array.from(new Uint8Array(digest))
        .map(function (b) {
          return b.toString(16).padStart(2, "0");
        })
        .join("");
    }

    var restoreOverflow = document.documentElement.style.overflow;
    document.documentElement.style.overflow = "hidden";

    var overlay = document.createElement("div");
    overlay.innerHTML =
      "<style>" +
      ".gate-overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.88);z-index:9999;font-family:sans-serif;transition:opacity .2s ease}" +
      ".gate-overlay.fade{opacity:0;pointer-events:none}" +
      ".gate-card{background:#111;color:#eee;padding:24px;border-radius:14px;width:min(90vw,420px);text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.4)}" +
      ".gate-input{width:90%;padding:10px;border-radius:8px;border:1px solid #555;background:#222;color:#fff;margin-top:12px}" +
      ".gate-btn{margin-top:14px;padding:10px 16px;border:0;border-radius:8px;background:#2563eb;color:#fff;font-weight:bold;cursor:pointer}" +
      ".gate-btn:disabled{opacity:.65;cursor:not-allowed}" +
      ".msg{margin-top:10px;font-size:.95rem;min-height:1.2em}" +
      "</style>" +
      '<div class="gate-overlay" role="dialog" aria-modal="true" aria-labelledby="gate-title">' +
      '  <div class="gate-card">' +
      '    <h2 id="gate-title">Answer this to enter</h2>' +
      "    <p>" +
      escapeHtml(QUESTION) +
      "</p>" +
      '    <input class="gate-input" type="text" autocomplete="off" spellcheck="false" placeholder="Your answer..." aria-label="Your answer" />' +
      '    <button class="gate-btn" type="button">Submit</button>' +
      '    <div class="msg" aria-live="polite"></div>' +
      "  </div>" +
      "</div>";

    document.body.appendChild(overlay);

    var gate = overlay.querySelector(".gate-overlay");
    var input = overlay.querySelector(".gate-input");
    var btn = overlay.querySelector(".gate-btn");
    var msg = overlay.querySelector(".msg");

    setTimeout(function () {
      if (input) input.focus();
    }, 10);

    var tries = 0;
    var firstWrong = false;
    var busy = false;

    function done() {
      sessionStorage.setItem(STORAGE_KEY, "1");
      gate.classList.add("fade");

      setTimeout(function () {
        overlay.remove();
        document.documentElement.style.overflow = restoreOverflow || "";
      }, 220);
    }

    async function handleSubmit() {
      if (busy) return;

      if (!window.crypto || !crypto.subtle) {
        msg.textContent =
          "This browser does not support the required security API.";
        return;
      }

      busy = true;
      btn.disabled = true;

      try {
        var answerHash = await sha256(normalize(input.value));
        var ok = ACCEPTED_HASHES.indexOf(answerHash) !== -1;

        tries++;

        if (tries === 1 && ok) return done();
        if (tries === 1 && !ok) firstWrong = true;

        if (firstWrong && FORCE_THREE_IF_FIRST_FAIL && tries < 3) {
          var left = 3 - tries;
          msg.textContent =
            left + " " + (left === 1 ? "try" : "tries") + " left.";
          input.select();
          return;
        }

        if (firstWrong && FORCE_THREE_IF_FIRST_FAIL && tries === 3)
          return done();

        if (ok) return done();

        msg.textContent = "Try again.";
        input.select();
      } finally {
        busy = false;
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", handleSubmit);

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        handleSubmit();
      }
    });
  })();
</script>
